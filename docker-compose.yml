services:
  sentry-mcp:
    build: .
    container_name: sentry-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
    ports:
      - "127.0.0.1:8765:8765"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
